<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: #1e293b; border-radius: 12px; padding: 10px; border: 1px solid #334155; }
        .card img { width: 100%; border-radius: 8px; }
        .price { color: #00d1ff; font-weight: bold; margin: 8px 0; }
        .btn { background: #00d1ff; color: black; border: none; width: 100%; padding: 8px; border-radius: 8px; font-weight: bold; }
        
        /* Стили формы заказа */
        #order-form { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); padding: 20px; box-sizing: border-box; z-index: 100;
        }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        .submit-btn { background: #22c55e; color: white; padding: 15px; width: 100%; border-radius: 8px; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <h2 style="text-align: center;">💎 TIMELESS 💎</h2>
    <div id="catalog" class="grid"></div>

    <div id="order-form">
        <h3>Оформление доставки</h3>
        <p id="selected-product"></p>
        <input type="text" id="name" placeholder="Имя и Фамилия">
        <input type="tel" id="phone" placeholder="Номер телефона">
        <select id="delivery">
            <option value="СДЭК">СДЭК</option>
            <option value="Почта России">Почта России</option>
            <option value="5Post">5Post (Пятерочка)</option>
        </select>
        <input type="text" id="address" placeholder="Адрес доставки или ПВЗ">
        <button class="submit-btn" onclick="sendOrder()">ПОДТВЕРДИТЬ ЗАКАЗ</button>
        <button style="background:none; color: gray; width: 100%; margin-top: 10px; border: none;" onclick="closeForm()">Отмена</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let currentProduct = null;

        async function load() {
            const resp = await fetch('products.json?v=' + Date.now());
            const data = await resp.json();
            const cont = document.getElementById('catalog');
            data.forEach(p => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <img src="${p.photos[0]}">
                    <div style="font-size: 0.8em; margin-top: 5px;">${p.name}</div>
                    <div class="price">${p.price} ₽</div>
                    <button class="btn" onclick="openForm('${p.name}', ${p.price})">КУПИТЬ</button>
                `;
                cont.appendChild(div);
            });
        }

        function openForm(name, price) {
            currentProduct = {name, price};
            document.getElementById('selected-product').innerText = name + ' — ' + price + ' ₽';
            document.getElementById('order-form').style.display = 'block';
        }

        function closeForm() { document.getElementById('order-form').style.display = 'none'; }

        function sendOrder() {
            const data = {
                product: currentProduct.name,
                price: currentProduct.price,
                client_name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                delivery: document.getElementById('delivery').value,
                address: document.getElementById('address').value
            };
            if(!data.client_name || !data.phone || !data.address) return alert('Заполните все поля!');
            tg.sendData(JSON.stringify(data));
        }

        load();
        tg.expand();
    </script>
</body>
</html>
