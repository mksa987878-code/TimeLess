<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeless Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding: 15px; }
        .catalog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card { background: #1a1a1a; border-radius: 12px; padding: 10px; display: flex; flex-direction: column; }
        .photo-container { width: 100%; aspect-ratio: 1; overflow: hidden; border-radius: 8px; margin-bottom: 8px; }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }
        h3 { font-size: 0.9em; margin: 5px 0; min-height: 2.4em; }
        .price { color: #00d1ff; font-weight: bold; }
    </style>
</head>
<body>
    <div id="catalog" class="catalog-grid">Загрузка товаров...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function loadProducts() {
            const container = document.getElementById('catalog');
            try {
                // Добавляем случайное число, чтобы не грузить старую версию из кеша
                const response = await fetch('products.json?nocache=' + Math.random());
                const products = await response.json();
                
                if (products.length === 0) {
                    container.innerText = 'Каталог пока пуст.';
                    return;
                }

                container.innerHTML = '';
                products.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    
                    // Берем первое фото из списка или используем photo_url
                    const photoUrl = Array.isArray(p.photos) ? p.photos[0] : p.photo_url;
                    
                    card.innerHTML = `
                        <div class="photo-container">
                            <img src="${photoUrl || 'https://via.placeholder.com/150'}" alt="часы">
                        </div>
                        <h3>${p.name}</h3>
                        <div class="price">${p.price} stars</div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                console.error(e);
                container.innerText = 'Ошибка загрузки. Проверьте products.json на GitHub.';
            }
        }
        loadProducts();
    </script>
</body>
</html>
