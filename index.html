<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeless Premium Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); /* Глубокий космический фон */
            color: white;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .catalog-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }
        .product-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.2s;
        }
        .product-card:active {
            transform: scale(0.95);
        }
        .photo-container {
            width: 100%;
            height: 150px;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            margin-bottom: 8px;
        }
        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        h3 {
            font-size: 0.9em;
            margin: 8px 0;
            height: 35px;
            overflow: hidden;
        }
        .price {
            color: #00d1ff;
            font-weight: bold;
            font-size: 1.1em;
            text-shadow: 0 0 10px rgba(0, 209, 255, 0.5);
        }
        .buy-btn {
            background: #00d1ff;
            color: black;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            margin-top: 10px;
            font-weight: bold;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>💎 TIMELESS 💎</h2>
        <p>Премиальные аксессуары</p>
    </div>
    <div id="catalog" class="catalog-grid"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function loadProducts() {
            const container = document.getElementById('catalog');
            try {
                const response = await fetch('products.json?v=' + Date.now());
                const products = await response.json();
                
                container.innerHTML = '';
                products.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    const photoUrl = Array.isArray(p.photos) ? p.photos[0] : p.photo_url.split(',')[0];
                    
                    card.innerHTML = `
                        <div class="photo-container">
                            <img src="${photoUrl}" alt="${p.name}">
                        </div>
                        <h3>${p.name}</h3>
                        <div class="price">${p.price} ₽</div>
                        <button class="buy-btn">Купить</button>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                container.innerText = 'Ошибка загрузки каталога.';
            }
        }
        loadProducts();
    </script>
</body>
</html>
