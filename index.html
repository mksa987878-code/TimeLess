<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeless Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-color: #d4af37; --bg-color: #0f0f0f; --card-bg: #1a1a1a; --text-color: #fff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; padding: 15px; }
        header { text-align: center; padding: 10px 0; border-bottom: 1px solid #333; margin-bottom: 20px; }
        header h1 { color: var(--main-color); letter-spacing: 2px; text-transform: uppercase; font-size: 18px; margin: 0; }
        #catalog { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .product-card { background: var(--card-bg); border-radius: 12px; padding: 10px; text-align: center; border: 1px solid #222; }
        .product-card img { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; }
        .name { font-size: 13px; height: 32px; overflow: hidden; margin-bottom: 5px; }
        .price { color: var(--main-color); font-weight: bold; font-size: 15px; margin-bottom: 8px; }
        button { background: var(--main-color); color: #000; border: none; padding: 8px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <header><h1>TIMELESS STORE</h1></header>
    <div id="catalog">Загрузка товаров...</div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        async function loadProducts() {
            try {
                // Добавляем случайное число к ссылке, чтобы браузер не кэшировал старые данные
                const response = await fetch('products.json?v=' + Math.random());
                const products = await response.json();
                const catalog = document.getElementById('catalog');
                catalog.innerHTML = '';

                if (products.length === 0) {
                    catalog.innerHTML = '<div style="grid-column: 1/3; color: #666;">Товары скоро появятся...</div>';
                    return;
                }

                products.forEach(p => {
                    catalog.innerHTML += `
                        <div class="product-card">
                            <img src="${p.photo_url}" alt="Watch">
                            <div class="name">${p.name}</div>
                            <div class="price">${p.price} ₽</div>
                            <button onclick="tg.sendData('order:${p.name}')">КУПИТЬ</button>
                        </div>`;
                });
            } catch (e) {
                document.getElementById('catalog').innerHTML = 'Добавьте первый товар через бота!';
            }
        }
        loadProducts();
    </script>
</body>
</html>
