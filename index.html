<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeless Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding: 15px; }
        .product-card { background: #1a1a1a; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 10px; }
        .photo-grid img { width: 100%; border-radius: 8px; object-fit: cover; aspect-ratio: 1; }
        h3 { margin: 10px 0; color: #fff; }
        .price { color: #00d1ff; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>
    <div id="catalog">Загрузка товаров...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function loadProducts() {
            try {
                // Добавляем случайное число, чтобы GitHub не выдавал старую версию из кеша
                const response = await fetch('products.json?v=' + Math.random());
                const products = await response.json();
                const container = document.getElementById('catalog');
                container.innerHTML = '';

                products.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    
                    // Проверяем, есть ли список фото или одна строка
                    const photos = Array.isArray(p.photos) ? p.photos : [p.photo_url];
                    
                    let photosHtml = '<div class="photo-grid">';
                    photos.forEach(url => {
                        photosHtml += `<img src="${url}" alt="watch">`;
                    });
                    photosHtml += '</div>';

                    card.innerHTML = `
                        ${photosHtml}
                        <h3>${p.name}</h3>
                        <p class="price">${p.price} stars</p>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                document.getElementById('catalog').innerText = 'Ошибка загрузки каталога.';
            }
        }
        loadProducts();
    </script>
</body>
</html>
